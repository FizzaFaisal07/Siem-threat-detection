<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIEM Security System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
       body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(10,14,39,0.3) 0%, rgba(26,31,58,0.3) 100%), url('/static/1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveBackground 20s linear infinite;
            opacity: 0.5;
            pointer-events: none;
        }
        
        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            z-index: 1;
            margin: 10px auto;
        }
        
        .login-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px 40px 30px 40px;
            width: 100%;
            min-height: 580px;
            max-height: 95vh;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            transition: transform 0.3s;
            overflow-y: auto;
        }
        
        .login-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .login-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .login-container::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }
        
        .login-container:hover {
            transform: translateY(-3px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .logo h1 {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            margin-bottom: 6px;
        }
        
        .logo p { 
            color: #8b9dc3; 
            font-size: 13px; 
            letter-spacing: 0.5px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: #00d4ff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        
        input {
            width: 100%;
            padding: 11px 15px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 12px rgba(0,212,255,0.2);
            background: rgba(0,0,0,0.6);
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.25);
        }
        
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #00d4ff, #0284c7);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        
        .btn-login:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 5px 20px rgba(0,212,255,0.3);
        }
        
        .error {
            background: rgba(239,68,68,0.12);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 14px;
            text-align: center;
            font-size: 13px;
            border-left: 3px solid #ef4444;
        }
        
        .success {
            background: rgba(16,185,129,0.12);
            color: #10b981;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 14px;
            text-align: center;
            font-size: 13px;
            border-left: 3px solid #10b981;
        }
        
        .info {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
        }
        
        .info a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
        }
        
        .info a:hover { text-decoration: underline; }
        
        .demo-credentials {
            background: rgba(0,212,255,0.06);
            padding: 12px 14px;
            border-radius: 10px;
            margin-top: 14px;
            text-align: center;
            border: 1px solid rgba(0,212,255,0.1);
            font-size: 13px;
        }
        
        .demo-credentials strong {
            color: #00d4ff;
            font-size: 13px;
        }
        
        .demo-credentials code {
            background: rgba(0,0,0,0.3);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #00d4ff;
            font-family: monospace;
        }
        
        .demo-credentials small {
            color: #8b9dc3;
            font-size: 11px;
            display: block;
            margin-top: 4px;
        }
        
        .security-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding: 10px 12px;

            flex-wrap: wrap;
        }
        
        .security-badge span {
            font-size: 10px;
            color: #8b9dc3;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* 2FA Section */
        .twofa-input {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .twofa-input.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .otp-timer {
            color: #8b9dc3;
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            font-family: monospace;
        }
        
        .resend-btn {
            background: transparent;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 7px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            width: auto;
            margin: 8px auto 0;
            display: block;
        }
        
        .resend-btn:hover {
            background: #00d4ff;
            color: #0a0e27;
        }
        
        .otp-status {
            text-align: center;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            margin-top: 6px;
        }
        
        .otp-status.sent {
            color: #10b981;
            background: rgba(16,185,129,0.08);
        }
        
        .otp-status.error {
            color: #ef4444;
            background: rgba(239,68,68,0.08);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 25px 20px 20px 20px;
                min-height: 500px;
                max-height: 98vh;
            }
            
            .logo h1 {
                font-size: 26px;
            }
            
            .logo p {
                font-size: 11px;
            }
            
            .security-badge {
                gap: 8px;
            }
            
            .security-badge span {
                font-size: 9px;
                padding: 3px 10px;
            }
            
            .btn-login {
                font-size: 15px;
                padding: 12px;
            }
            
            input {
                font-size: 13px;
                padding: 10px 13px;
            }
            
            .input-group {
                margin-bottom: 14px;
            }
        }
        
        @media (max-height: 700px) {
            .login-container {
                padding: 20px 25px 15px 25px;
                min-height: 450px;
                max-height: 98vh;
            }
            
            .logo {
                margin-bottom: 16px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
            
            .input-group {
                margin-bottom: 12px;
            }
            
            .demo-credentials {
                padding: 8px 12px;
                margin-top: 10px;
            }
            
            .security-badge {
                margin-top: 10px;
                padding: 6px 10px;
            }
        }

    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo">
                <h1>🛡️ SIEM System</h1>
                <p>Security Information & Event Management</p>
            </div>
            
            <div id="messageArea">
                {% if error %}
                <div class="error">❌ {{ error }}</div>
                {% endif %}
                
                {% if success %}
                <div class="success">✅ {{ success }}</div>
                {% endif %}
            </div>
            
            <form method="POST" id="loginForm">
                <div class="input-group">
                    <label>👤 Username</label>
                    <input type="text" name="username" id="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="input-group">
                    <label>🔐 Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter password" required>
                </div>
                
                <!-- 2FA OTP Field (hidden initially) -->
                <div class="input-group twofa-input" id="twofaGroup">
                    <label>🔑 2FA Verification Code</label>
                    <input type="text" name="otp_code" id="otpCode" placeholder="Enter 6-digit code sent to your email" maxlength="6" autocomplete="one-time-code">
                    <div id="otpStatus" class="otp-status" style="display:none;"></div>
                    <div id="otpTimer" class="otp-timer"></div>
                    <button type="button" class="resend-btn" id="resendBtn" onclick="resendOTP()" style="display:none;">📧 Resend OTP</button>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">Login to Dashboard</button>
            </form>
            
            <div class="info">
                Don't have an account? <a href="/signup">Create Account</a>
            </div>
            
            <div class="security-badge">
                <span>🔐 SHA-256 Hashed</span>
                <span>📧 2FA Email OTP</span>
                <span>🛡️ Brute Force Protection</span>
            </div>
        </div>
    </div>
    
    <script>
        // Check if 2FA is required
        let otpRequested = false;
        let otpTimer = null;
        let timeLeft = 60; // 1 minute
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // If 2FA OTP was requested and not yet verified, allow submission with OTP
            if (otpRequested) {
                return true;
            }
            
            // Check if error message says "2FA_OTP_REQUIRED"
            const errorDiv = document.querySelector('.error');
            if (errorDiv && errorDiv.textContent.includes('2FA_OTP_REQUIRED')) {
                e.preventDefault();
                showOTPField();
                return false;
            }
            return true;
        });
        
        function showOTPField() {
    const twofaGroup = document.getElementById('twofaGroup');
    twofaGroup.classList.add('show');
    otpRequested = true;
    
    setTimeout(() => {
        document.getElementById('otpCode').focus();
    }, 60);
    
    // Show status message
    const status = document.getElementById('otpStatus');
    status.style.display = 'block';
    status.className = 'otp-status sent';
    status.textContent = '📧 OTP sent to your email! Check your inbox.';
    
    // Make it disappear after 5 seconds
    setTimeout(() => {
        status.style.display = 'none';
    }, 5000);
    
    document.getElementById('resendBtn').style.display = 'block';
    startOTPTimer();
    document.getElementById('loginBtn').textContent = 'Verify & Login';
    
    setTimeout(() => {
        twofaGroup.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);
}
        
        function startOTPTimer() {
            timeLeft = 60;
            const timerDiv = document.getElementById('otpTimer');
            
            if (otpTimer) clearInterval(otpTimer);
            
            otpTimer = setInterval(function() {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDiv.textContent = `⏱️ OTP expires in: ${seconds} seconds`;
                
                if (timeLeft <= 0) {
                    clearInterval(otpTimer);
                    timerDiv.textContent = '⏰ OTP expired. Click "Resend OTP"';
                    const status = document.getElementById('otpStatus');
                    status.className = 'otp-status error';
                    status.textContent = '⏰ OTP expired. Please request a new one.';
                    document.getElementById('resendBtn').style.display = 'block';
                }
            }, 1000);
        }
        
        function resendOTP() {
    const username = document.getElementById('username').value;
    if (!username) {
        const status = document.getElementById('otpStatus');
        status.style.display = 'block';
        status.className = 'otp-status error';
        status.textContent = '❌ Please enter your username first';
        setTimeout(() => {
            status.style.display = 'none';
        }, 3000);
        return;
    }
    
    const status = document.getElementById('otpStatus');
    status.style.display = 'block';
    status.className = 'otp-status sent';
    status.textContent = '📧 Sending new OTP...';
    
    fetch('/api/request-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            status.className = 'otp-status sent';
            status.textContent = '📧 New OTP sent! Check your email.';
            // Make it disappear after 5 seconds
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
            startOTPTimer();
        } else {
            status.className = 'otp-status error';
            status.textContent = '❌ ' + data.message;
            setTimeout(() => {
                status.style.display = 'none';
            }, 4000);
        }
    })
    .catch(err => {
        status.className = 'otp-status error';
        status.textContent = '❌ Failed to send OTP';
        setTimeout(() => {
            status.style.display = 'none';
        }, 4000);
    });
}
        
        // Check if URL has 2FA parameter
        if (window.location.search.includes('2fa=required')) {
            showOTPField();
        }
        
        // Auto-detect 2FA requirement from error message
        const errorDiv = document.querySelector('.error');
        if (errorDiv && errorDiv.textContent.includes('2FA_OTP_REQUIRED')) {
            showOTPField();
        }
    </script>
</body>
</html>
